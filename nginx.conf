server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ----- Headers de seguridad -----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; img-src 'self' data: https://www.facebook.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://connect.facebook.net; connect-src 'self' https://bettasoluciones-n8nn.cx2wou.easypanel.host https://www.facebook.com; frame-src https://www.facebook.com; frame-ancestors 'self'; form-action 'self' https://www.facebook.com; object-src 'none'" always;
    # HSTS: si el TLS lo termina Easypanel/Traefik, configuralo alli para evitar headers duplicados.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ----- Pagina 404 propia -----
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
